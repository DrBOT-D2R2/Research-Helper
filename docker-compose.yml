version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: knowledge-vault-backend:latest
    restart: unless-stopped
    environment:
      KNOWLEDGE_VAULT_ENV: production
      KNOWLEDGE_VAULT_HOST: 0.0.0.0
      KNOWLEDGE_VAULT_PORT: 8000
      KNOWLEDGE_VAULT_DATA_DIR: /app/data
      KNOWLEDGE_VAULT_DATABASE_URL: /app/data/sqlite/knowledge_vault.db
    expose:
      - "8000"
    volumes:
      - backend_data:/app/data
    networks:
      - knowledge-vault

frontend:
      build:
        context: .
        file: Dockerfile.frontend
        args:
          VITE_API_BASE_URL: ""
      image: knowledge-vault-frontend:latest
      restart: unless-stopped
      depends_on:
        - backend
      ports:
        - "80:80" # Keep it strictly to port 80 for cleartext HTTP traffic for now
      networks:
        - knowledge-vault

networks:
  knowledge-vault:
    driver: bridge

volumes:
  backend_data:
