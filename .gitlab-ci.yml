stages:
  - lint
  - security
  - build
  - test
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cache/pip
    - frontend/node_modules/
    - frontend/.npm/

.python_lint_setup:
  image: python:3.12-slim
  before_script:
    - pip install "ruff<1.0" "black<25.0"

.python_setup:
  image: python:3.12
  before_script:
    - python --version
    - pip install --upgrade pip
    - if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - pip install ruff black mypy pytest

.node_setup:
  image: node:20
  before_script:
    - cd frontend
    - if [ -f package-lock.json ]; then npm ci; else npm install; fi

.docker_build_setup:
  image: docker:27
  before_script:
    - docker info

lint:python-ruff:
  stage: lint
  extends: .python_lint_setup
  tags:
    - my-custom-runner-tag
  script:
    - ruff check .

lint:python-black:
  stage: lint
  extends: .python_lint_setup
  tags:
    - my-custom-runner-tag
  script:
    - black --check .

lint:frontend-types:
  stage: lint
  extends: .node_setup
  tags:
    - my-custom-runner-tag
  script:
    - npm run typecheck

security:python-mypy:
  stage: security
  extends: .python_setup
  tags:
    - my-custom-runner-tag
  script:
    - mypy backend

security:secrets:
  stage: security
  image: alpine:3.20
  tags:
    - my-custom-runner-tag
  script:
    - echo "Checking for hardcoded credentials..."

build:backend-image:
  stage: build
  extends: .docker_build_setup
  tags:
    - my-custom-runner-tag
  script:
    - docker build -f Dockerfile.backend -t knowledge-vault-backend:latest .

build:frontend-image:
  stage: build
  extends: .docker_build_setup
  tags:
    - my-custom-runner-tag
  script:
    - docker build -f Dockerfile.frontend -t knowledge-vault-frontend:latest .

test:backend-unit:
  stage: test
  extends: .python_setup
  tags:
    - my-custom-runner-tag
  script:
    - |
      if [ -d tests ]; then
        pytest
      else
        echo "No tests directory found, skipping pytest."
      fi

deploy:local-registry:
  stage: deploy
  image: alpine:3.20
  tags:
    - my-custom-runner-tag
  script:
    - echo "Deploying/tagging images for local cluster management..."
